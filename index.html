<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesprekssimulator — Loongesprek</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #1c2a4a;
  --accent: #4a9eff;
  --green: #4ade80;
  --green-bg: rgba(74, 222, 128, 0.08);
  --green-border: rgba(74, 222, 128, 0.25);
  --orange: #fb923c;
  --orange-bg: rgba(251, 146, 60, 0.08);
  --orange-border: rgba(251, 146, 60, 0.25);
  --red: #f87171;
  --red-bg: rgba(248, 113, 113, 0.08);
  --red-border: rgba(248, 113, 113, 0.25);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --stien-purple: #c4a6e8;
  --stien-bg: #2d2040;
  --stien-border: rgba(168, 130, 220, 0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px 120px; }
.header { text-align: center; padding: 32px 0 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }
.header-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text-bright); font-weight: 400; }
.header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }
.progress-wrap { position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 8px 0; }
.progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
.progress-text { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 6px; letter-spacing: 1px; }
.phase-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 14px; padding: 6px 12px; background: rgba(74,158,255,0.08); border-radius: 6px; display: inline-block; }
.scene { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.stien-bubble { background: var(--stien-bg); border: 1px solid var(--stien-border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 16px 20px; margin-bottom: 12px; max-width: 90%; }
.stien-name { font-size: 11px; font-weight: 700; color: var(--stien-purple); letter-spacing: 0.5px; margin-bottom: 6px; text-transform: uppercase; }
.stien-text { font-size: 15px; line-height: 1.6; }
.context { font-size: 13px; color: var(--text-dim); font-style: italic; line-height: 1.5; padding: 10px 0 16px; border-bottom: 1px solid rgba(255,255,255,0.04); margin-bottom: 16px; }
.options-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.option-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; margin-bottom: 10px; overflow: hidden; transition: all 0.2s ease; cursor: pointer; }
.option-card:hover:not(.revealed) { border-color: var(--accent); transform: translateX(3px); }
.option-card.revealed { cursor: default; }
.option-card.revealed.green { border-color: var(--green-border); background: var(--green-bg); }
.option-card.revealed.orange { border-color: var(--orange-border); background: var(--orange-bg); }
.option-card.revealed.red { border-color: var(--red-border); background: var(--red-bg); }
.option-card.revealed.dimmed { opacity: 0.45; }
.option-card.revealed.dimmed .option-feedback { display: none; }
.option-card.revealed.selected .option-feedback { display: block; }
.option-top { padding: 14px 18px; }
.option-text { font-size: 14px; line-height: 1.55; color: var(--text); }
.option-badge { display: none; margin-top: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.revealed .option-badge { display: inline-block; }
.green .option-badge { color: var(--green); }
.orange .option-badge { color: var(--orange); }
.red .option-badge { color: var(--red); }
.option-feedback { display: none; padding: 12px 18px 14px; font-size: 13px; line-height: 1.55; border-top: 1px solid rgba(255,255,255,0.06); }
.green .option-feedback { color: var(--green); border-top-color: var(--green-border); }
.orange .option-feedback { color: var(--orange); border-top-color: var(--orange-border); }
.red .option-feedback { color: var(--red); border-top-color: var(--red-border); }
.show-all-btn { display: none; width: 100%; padding: 10px; margin-top: 6px; background: none; border: 1px dashed rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s ease; }
.show-all-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
.nav-btn { padding: 12px 24px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
.nav-btn:hover { border-color: var(--accent); }
.nav-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.nav-btn.primary:hover { background: #6bb3ff; }
.end-screen { text-align: center; padding: 40px 0; }
.end-screen h2 { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text-bright); margin-bottom: 8px; }
.end-screen p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
.score-big { font-size: 52px; font-family: 'DM Serif Display', serif; color: var(--accent); margin: 16px 0; }
.score-row { display: flex; justify-content: center; gap: 20px; margin: 12px 0 28px; font-size: 14px; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const scenes = [
  // FASE 1: OPENING EN TOON
  {
    phase: "Fase 1: Opening en toon",
    stien: "Jorgo, ik heb je document gelezen. Dat is... nogal wat. Ik wist niet dat je zo ontevreden was over je loon.",
    context: "De opening. Stien reageert op het document. De toon die je hier zet, kleurt het hele gesprek.",
    options: [
      { text: "\"Ontevreden is niet het juiste woord, Stien. Ik ben heel graag bij Clavis en ik waardeer wat we samen opbouwen. Maar mijn rol is de voorbije jaren flink geëvolueerd, en ik denk dat het tijd is om het loonpakket daarmee in lijn te brengen.\"", rating: "green", label: "Sterk", feedback: "Perfect. Je corrigeert haar framing zonder haar tegen te spreken. 'Ontevreden' wordt 'geëvolueerd' \u2014 dat is een heel ander gesprek. En je begint met waardering, niet met een klacht." },
      { text: "\"Ja, ik zit er al een tijdje mee. Het is gewoon niet meer houdbaar met wat ik verdien en wat ik allemaal doe.\"", rating: "orange", label: "Risicovol", feedback: "Eerlijk, maar je bevestigt haar framing van 'ontevreden.' Nu is het een gesprek over een probleem in plaats van over een kans. En 'niet meer houdbaar' klinkt als een dreigement voordat het gesprek begonnen is." },
      { text: "\"Ontevreden? Nee, ik heb gewoon de marktdata opgezocht en dan zie je toch duidelijk dat ik echt onderbetaald ben voor wat ik doe.\"", rating: "red", label: "Vermijden", feedback: "Te confronterend. 'Onderbetaald' is een beschuldiging. Stien gaat in de verdediging en het gesprek wordt een debat over of het loon eerlijk is, in plaats van een gezamenlijke blik op de toekomst." }
    ]
  },
  {
    phase: "Fase 1: Opening en toon",
    stien: "Ik ben eerlijk gezegd een beetje gekwetst dat je dit zo formeel aanpakt in plaats van gewoon met mij te komen praten.",
    context: "Stien voelt zich overvallen door de formaliteit. Jullie relatie is kameraadschappelijk \u2014 ze had verwacht dat je gewoon zou binnenwandelen.",
    options: [
      { text: "\"Dat spijt me, dat was zeker niet mijn bedoeling. Ik heb het juist zo uitgewerkt omdat ik het serieus neem \u2014 en omdat ik vind dat jij verdient om het volledige plaatje te zien, niet alleen een onderbuikgevoel van mij. Maar het gesprek dat we nu voeren, dat \u00eds gewoon praten. Het document is de onderbouwing, dit gesprek is wat telt.\"", rating: "green", label: "Sterk", feedback: "Je erkent haar gevoel, legt uit waarom je het zo hebt aangepakt, en brengt het terug naar de menselijke relatie. De laatste zin is de sleutel: het document is het middel, het gesprek is het doel." },
      { text: "\"Ik wilde het juist goed voorbereiden zodat we een productief gesprek kunnen voeren. Anders wordt het een discussie zonder basis.\"", rating: "orange", label: "Risicovol", feedback: "Inhoudelijk klopt dit, maar het klinkt alsof je zegt: zonder mijn document zou dit gesprek niets voorstellen. Dat is niet wat Stien wil horen." },
      { text: "\"Ik vond dat een informeel gesprek niet gepast was gezien de omvang van wat ik wil bespreken.\"", rating: "red", label: "Vermijden", feedback: "Te afstandelijk. Je bevestigt precies wat Stien vreest: dat het niet meer informeel is. Het gesprek wordt meteen formeler en kouder." }
    ]
  },
  {
    phase: "Fase 1: Opening en toon",
    stien: "Jorgo, ik maak me eerlijk gezegd zorgen. Is er iets aan de hand?",
    context: "Stien kent je goed, ze weet waarschijnlijk iets over je priv\u00e9situatie, en ze interpreteert het voorstel als een noodsignaal.",
    options: [
      { text: "\"Lief dat je dat vraagt. Het gaat goed met me. Dit voorstel komt niet uit nood \u2014 het komt uit het besef dat mijn rol de voorbije jaren enorm is gegroeid en dat het tijd is om dat formeel te verankeren. De timing heeft inderdaad te maken met het feit dat er het komende jaar wat dingen veranderen in mijn leven, en dat ik daarvoor een stabiele basis nodig heb. Maar de inhoud van het voorstel staat los van mijn priv\u00e9situatie \u2014 het gaat over wat ik doe en wat dat waard is.\"", rating: "green", label: "Sterk", feedback: "Warm, eerlijk, en je scheidt priv\u00e9 van professioneel zonder iets te verbergen. De zin 'staat los van mijn priv\u00e9situatie' is cruciaal: het voorkomt dat Stien het voorstel gaat zien als een hulpvraag." },
      { text: "\"Nee hoor, alles ok\u00e9. Ik heb gewoon de tijd genomen om dit goed voor te bereiden.\"", rating: "orange", label: "Risicovol", feedback: "Te afwerend. Stien stelt een oprechte vraag en je sluit de deur. Dat voelt oneerlijk in een relatie die gebaseerd is op vertrouwen." },
      { text: "\"Ja, er verandert veel in mijn leven. Ik ga binnenkort alleen wonen met twee kinderen en ik kan het simpelweg niet meer betalen met wat ik nu verdien.\"", rating: "red", label: "Vermijden", feedback: "Te kwetsbaar. Je maakt het voorstel tot een smeekbede. Stien gaat van modus 'directeur' naar modus 'vriendin' \u2014 en vanuit die modus geeft ze misschien een kleine geste, maar geen structurele herwaardering." }
    ]
  },
  {
    phase: "Fase 1: Opening en toon",
    stien: "*Stien leest het document, kijkt op, en zegt niets. Stilte.*",
    context: "Veel mensen zijn niet voorbereid op stilte. Ze vullen het op met concessies of relativering. Dat is precies wat je niet moet doen.",
    options: [
      { text: "Niets zeggen. Tel in je hoofd tot tien. Als ze na tien seconden nog niets zegt, vraag je rustig: \"Wat zijn je eerste gedachten?\"", rating: "green", label: "Sterk", feedback: "De stilte is niet vijandig \u2014 Stien verwerkt. Laat haar de ruimte. 'Wat zijn je eerste gedachten?' is open, uitnodigend, en legt de bal bij haar zonder druk." },
      { text: "\"Ik weet dat het veel is. We hoeven niet alles vandaag te beslissen. Het is meer een aanzet tot gesprek.\"", rating: "red", label: "Vermijden", feedback: "Je begint je eigen voorstel af te zwakken terwijl Stien nog niets heeft gezegd. Ze was misschien gewoon aan het nadenken \u2014 en nu heb je het zelf al gerelativeerd." },
      { text: "\"Ik ben benieuwd wat je ervan vindt. Zal ik even door de hoofdlijnen lopen?\"", rating: "orange", label: "Risicovol", feedback: "Niet slecht, maar je vult de stilte op terwijl dat niet nodig was. Soms is het krachtigste wat je kunt doen: wachten." }
    ]
  },
  // FASE 2: INHOUDELIJKE PUSHBACK
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "\u20AC5.500 is echt een serieus bedrag, Jorgo. Dat is bijna \u20AC1.400 meer dan nu.",
    context: "De pushback op het bedrag. Dit is het moment waarop je anker onder druk staat.",
    options: [
      { text: "\"Ik snap dat het een grote stap lijkt. Maar kijk even naar de tabel in het document: \u20AC5.500 zit in het midden van wat de markt betaalt voor een Creative Director. Ik vraag niet het maximum \u2014 ik vraag een bescheiden positie binnen die range.\"", rating: "green", label: "Sterk", feedback: "Je erkent haar gevoel, maar brengt het onmiddellijk terug naar de feiten. De tabel doet het werk \u2014 je hoeft niet te argumenteren, je wijst naar de data." },
      { text: "\"Ik weet het. Maar als je kijkt naar wat ik allemaal doe \u2014 de drie pijlers, de webinars, de AI-implementatie \u2014 dan is het eigenlijk nog conservatief.\"", rating: "orange", label: "Risicovol", feedback: "Inhoudelijk juist, maar je mist de erkenning van haar bezorgdheid. Als je meteen gaat beargumenteren zonder eerst te luisteren, voelt het voor Stien als een debat, niet als een gesprek." },
      { text: "\"Ja, maar als je het doorrekent is het voor Clavis ook maar \u20AC1.780 extra per maand aan loonkost. Dat is te overzien voor een bedrijf als Clavis.\"", rating: "red", label: "Vermijden", feedback: "Je vertelt Stien wat Clavis wel of niet kan betalen. Dat is haar terrein, niet het jouwe. Het komt over als betweterig." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Ik had eerlijk gezegd niet verwacht dat het z\u00f3 uitgebreid zou zijn. Ik dacht dat het meer een informeel gesprek zou worden.",
    context: "Stien voelt zich overweldigd door de omvang van het document.",
    options: [
      { text: "\"Dat snap ik. Ik wilde het juist goed voorbereiden omdat het voor mij echt belangrijk is \u2014 en omdat ik het gevoel heb dat je verdient om het volledige plaatje te zien, niet alleen een vraag om meer loon. Het document is er om te onderbouwen, niet om druk te zetten. We kunnen het gesprek zo informeel voeren als je wilt.\"", rating: "green", label: "Sterk", feedback: "Je geeft Stien de controle terug over de toon van het gesprek, terwijl je het document positioneert als een hulpmiddel, niet als een aanval." },
      { text: "\"Ik heb er inderdaad veel werk in gestoken. Maar ik vond het belangrijk om het te onderbouwen met feiten en marktdata.\"", rating: "orange", label: "Risicovol", feedback: "Klopt, maar het klinkt als een verantwoording. Je hoeft je niet te verdedigen voor het feit dat je je goed hebt voorbereid." },
      { text: "\"Ik wilde vermijden dat het een gesprek zou worden op basis van gevoel. Met cijfers en feiten kunnen we objectiever beslissen.\"", rating: "red", label: "Vermijden", feedback: "Je impliceert dat Stien op gevoel zou beslissen als jij geen document had gemaakt. Dat is denigrerend, ook al bedoel je het niet zo." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Je doet inderdaad veel, maar iedereen hier doet meer dan zijn functie. Dat is nu eenmaal een KMO.",
    context: "Stien normaliseert jouw situatie. In een KMO doet iedereen meer dan de strikte functieomschrijving.",
    options: [
      { text: "\"Dat is waar, en dat is ook wat Clavis sterk maakt. Het verschil is dat mijn rol niet een beetje breder is dan mijn titel \u2014 het zijn drie volledige werkdomeinen die niets met elkaar te maken hebben. En dat is precies wat de functieclassificatie bevestigt: ik sta ingedeeld als Klasse B, ondersteunend. Dat klopt voor geen meter met wat ik doe.\"", rating: "green", label: "Sterk", feedback: "Je erkent haar punt, maar toont het verschil tussen 'iedereen doet iets extra' en 'iemand die structureel drie rollen combineert.' De Klasse B-verwijzing maakt het objectief." },
      { text: "\"Klopt, maar niemand anders combineert audio, AI, web en marketing in \u00e9\u00e9n persoon.\"", rating: "orange", label: "Risicovol", feedback: "Inhoudelijk sterk, maar het klinkt als een wedstrijd over wie het meeste doet. Dat is niet het gesprek dat je wilt voeren." },
      { text: "\"Dat is precies het probleem van een KMO: iedereen doet te veel en niemand wordt er correct voor betaald.\"", rating: "red", label: "Vermijden", feedback: "Je bekritiseert het bedrijfsmodel. Stien voelt zich aangevallen als directeur. Het gesprek verschuift van jouw situatie naar een fundamenteel meningsverschil." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Je spreekt over drie pijlers, maar sounddesign is wat we je gevraagd hebben. De rest heb je zelf opgepikt.",
    context: "Stien herframed je initiatief als iets ongevraagds. Dit kan je bijdrage minimaliseren.",
    options: [
      { text: "\"Dat klopt, en ik denk dat dat precies mijn punt is. Ik heb die dingen niet opgepikt omdat ik me verveelde \u2014 ik heb ze opgepikt omdat ik zag dat Clavis het nodig had en niemand anders het deed. De vraag is nu: wil je iemand die dat soort initiatief neemt, belonen als een sound designer of als wat hij werkelijk is?\"", rating: "green", label: "Sterk", feedback: "Je draait het argument om: initiatief nemen is geen bijwerking, het is precies de eigenschap die je waardevol maakt. De slotvraag is retorisch maar krachtig." },
      { text: "\"Dat klopt gedeeltelijk. Maar sommige dingen zijn me ook expliciet gevraagd \u2014 de studio, de webinars, de AI-workshops.\"", rating: "orange", label: "Risicovol", feedback: "Je gaat in de verdediging en probeert te bewijzen dat het niet allemaal eigen initiatief was. Dat verzwakt je punt: het maakt niet uit wie het idee had, het punt is dat jij het uitvoert." },
      { text: "\"Als ik alleen had gedaan wat me gevraagd was, had Clavis geen AI-implementatie, geen webinars, en geen mediastudio.\"", rating: "red", label: "Vermijden", feedback: "Klinkt als een dreigement. Stien hoort: 'je zou nergens staan zonder mij.' Dat is misschien waar, maar het is niet iets wat je hardop zegt." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Ik hoor wat je zegt over die Klasse B, maar dat is toch gewoon administratief? Dat heeft toch niets te maken met wat je verdient?",
    context: "Stien bagatelliseert de classificatie als paperassen.",
    options: [
      { text: "\"Het is inderdaad administratief \u2014 maar het is wel de administratie die bepaalt hoe de RSZ en de FOD Financi\u00ebn mijn functie zien. En de CAO van PC 200 zegt letterlijk dat de werkgever verantwoordelijk is voor de juiste indeling op basis van de werkelijk uitgeoefende functie. Het goede nieuws is: als we de titel, de classificatie en het loon samen aanpassen, klopt alles in \u00e9\u00e9n beweging. Dat is makkelijker dan het achteraf te moeten rechtzetten.\"", rating: "green", label: "Sterk", feedback: "Je neemt haar bezorgdheid serieus, geeft de juridische context, en draait het positief: samen aanpassen is makkelijker dan later corrigeren." },
      { text: "\"Het is meer dan administratief. Het bepaalt mijn barema-minimum en het is wat SD Worx gebruikt voor de loonadministratie.\"", rating: "orange", label: "Risicovol", feedback: "Klopt, maar het klinkt als een les in payroll. Stien wil niet uitgelegd krijgen hoe haar eigen administratie werkt." },
      { text: "\"Als het puur administratief is, dan is er toch geen reden om het niet aan te passen?\"", rating: "red", label: "Vermijden", feedback: "Slimme comeback, maar te confronterend. Je duwt Stien in een hoek waar ze alleen maar ja kan zeggen \u2014 en niemand houdt ervan om in een hoek geduwd te worden." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Je zit toch al mooi boven het barema. We zijn maar een KMO met beperkte middelen.",
    context: "Het barema-argument en het KMO-argument samen. De twee meest voorspelbare tegenargumenten.",
    options: [
      { text: "\"Je hebt gelijk dat ik boven het barema zit. Maar dat barema is het wettelijk minimum voor een ondersteunende functie \u2014 en we weten allebei dat mijn rol veel verder gaat dan dat. En wat betreft de KMO-realiteit: ik vraag niet het loon van een creative director bij een groot mediabedrijf. \u20AC5.500 zit aan de onderkant van de markt, niet aan de bovenkant.\"", rating: "green", label: "Sterk", feedback: "Je erkent beide punten en weerlegt ze zonder te confronteren. Het barema ontleed je met \u00e9\u00e9n feit. Het KMO-argument pareer je door te tonen dat je vraag al bescheiden is." },
      { text: "\"Ik begrijp de KMO-realiteit. Maar kijk het zo: ik doe het werk van meerdere mensen. Als ik morgen vertrek en je moet dat vervangen, dan betaal je voor drie of vier profielen apart een veelvoud van wat ik nu vraag. Dit voorstel is niet de duurste optie \u2014 het is de goedkoopste.\"", rating: "green", label: "Sterk", feedback: "Het retentie-argument, warm gebracht. Je dreigt niet met vertrek \u2014 je stelt een rekensom voor. En 'de goedkoopste optie' reframed het hele gesprek." },
      { text: "\"Het barema is irrelevant, Stien. Dat is een minimum dat niets te maken heeft met wat ik doe. En als Clavis me niet kan betalen wat ik waard ben, dan moet ik misschien elders gaan kijken.\"", rating: "red", label: "Vermijden", feedback: "Je verwerpt haar argument als irrelevant en dreigt met vertrek. Het gesprek is nu beschadigd." }
    ]
  },
  {
    phase: "Fase 2: Inhoudelijke pushback",
    stien: "Die Jobat-cijfers, zijn die wel betrouwbaar? Ik ken uitgeverijen waar ze minder betalen.",
    context: "Stien betwist een specifieke bron.",
    options: [
      { text: "\"Dat kan. De ranges die ik gebruik komen uit meerdere bronnen \u2014 Jobat, Robert Half, Indeed, Talent.com. Elke bron apart is een indicatie, maar samen geven ze een consistent beeld. En het klopt dat er uitgeverijen zijn die minder betalen \u2014 die zitten dan aan de onderkant van de range. Mijn voorstel zit in het midden, niet aan de bovenkant.\"", rating: "green", label: "Sterk", feedback: "Je erkent haar punt, toont dat je niet op \u00e9\u00e9n bron leunt, en herpositioneert je voorstel als bescheiden." },

    context: "Stien zegt drie dingen tegelijk: ze waardeert je, ze kan niet meteen beslissen, en ze vraagt ruimte. Dit is geen nee \u2014 dit is een opening.",
    options: [
      { text: "\"Dat is precies wat ik wil horen: dat je er serieus mee aan de slag gaat. Neem de tijd die je nodig hebt. Het enige wat ik vraag is dat we er een concreet moment aan koppelen \u2014 kunnen we bijvoorbeeld over twee weken opnieuw samenzitten?\"", rating: "green", label: "Sterk", feedback: "Perfecte afsluiter. Je geeft ruimte en koppelt er een datum aan." },
      { text: "\"Goed. Stien, ik wil nog \u00e9\u00e9n ding zeggen: ik wil heel graag bij Clavis blijven. Dit voorstel is er niet ondanks Clavis, maar juist omd\u00e1t ik hier wil blijven. Ik hoop dat dat duidelijk is.\"", rating: "green", label: "Sterk", feedback: "Krachtig en persoonlijk. Je eindigt met loyaliteit. De zin 'omd\u00e1t ik hier wil blijven' reframed het hele voorstel als betrokkenheid." },
      { text: "\"Ok\u00e9. Maar kan je me een indicatie geven van wanneer ik iets mag verwachten? Want dit is vrij dringend voor mij.\"", rating: "orange", label: "Risicovol", feedback: "Begrijpelijk, maar 'vrij dringend' zet druk op Stien op het slechtste moment \u2014 ze heeft net gezegd dat ze tijd nodig heeft." }
    ]
  },
  {
    phase: "Fase 5: Afsluiting",
    stien: "Stien stemt meteen in met je voorstel.",
    context: "Onwaarschijnlijk, maar mogelijk. Het risico is dat je zo verrast bent dat je begint te relativeren of te bedanken alsof je een gunst hebt gekregen.",
    options: [
      { text: "\"Dat maakt me heel blij, Stien. Dank je. Zullen we dan meteen afspreken hoe we het praktisch aanpakken met SD Worx?\"", rating: "green", label: "Sterk", feedback: "Kort, warm, en meteen naar de uitvoering. Niet gaan overtreffen of extra dingen vragen in de euforie." },
      { text: "\"Wow, dat had ik niet verwacht. Echt? Ben je zeker?\"", rating: "orange", label: "Risicovol", feedback: "Je toont verbazing en twijfel aan haar beslissing. Dat kan Stien doen twijfelen aan haar eigen keuze." },
      { text: "\"Super! En als we dan toch bezig zijn \u2014 die woning-VAA is ook heel interessant...\"", rating: "red", label: "Vermijden", feedback: "Je hebt net ja gekregen en je vraagt meteen meer. Dat ondermijnt het vertrouwen en het goede gevoel van het moment." }
    ]
  },
  {
    phase: "Fase 5: Afsluiting",
    stien: "Stien wordt emotioneel. \"Jorgo, ik voel me een beetje schuldig dat het zo ver is gekomen.\"",
    context: "Stien is niet boos, maar geraakt. Dit is een kwetsbaar moment voor haar.",
    options: [
      { text: "\"Daar hoef je je niet schuldig over te voelen. Dit is niet iets dat iemand fout heeft gedaan \u2014 het is gewoon geleidelijk gegroeid. En het feit dat we hier nu samen zitten om het recht te zetten, zegt alles over hoe Clavis met mensen omgaat. Laten we vooruitkijken.\"", rating: "green", label: "Sterk", feedback: "Je neemt de schuld weg, normaliseert de situatie, en eindigt met een positieve blik. 'Laten we vooruitkijken' sluit het emotionele moment af zonder het te negeren." },
      { text: "\"Ik vind het fijn dat je dat zegt. Het is inderdaad lang blijven aanslepen.\"", rating: "orange", label: "Risicovol", feedback: "Je bevestigt het schuldgevoel in plaats van het weg te nemen. 'Lang blijven aanslepen' klinkt als een verwijt." },
      { text: "\"Tja, het had inderdaad eerder mogen gebeuren. Maar goed, we zijn er nu.\"", rating: "red", label: "Vermijden", feedback: "Je bevestigt de schuld expliciet. Stien voelt zich veroordeeld op een moment van kwetsbaarheid. Dat beschadigt het vertrouwen." }
    ]
  },
  {
    phase: "Fase 5: Afsluiting",
    stien: "Jorgo, \u20AC4.800 is het beste wat we nu kunnen doen. Volgend jaar moeten we het weer eens bekijken. Punt.",
    context: "Stien trekt een harde grens. Geen ruimte voor meer. Dit is het moeilijkste moment van het hele gesprek.",
    options: [
      { text: "\"Stien, ik waardeer dat je dit doet. \u20AC4.800 is een stap, en ik zie dat je je best doet binnen wat er nu mogelijk is. Ik wil daar niet ondankbaar voor zijn.\" *Korte pauze.* \"Maar ik moet eerlijk zijn: vanaf volgend jaar sta ik er alleen voor. Huur, kinderen, alles op \u00e9\u00e9n inkomen. Als ik vandaag \u20AC4.800 accepteer zonder te weten waar ik in 2027 aan toe ben, dan leef ik de komende maanden met een onzekerheid die ik mijn gezin niet kan aandoen. Wat ik vraag is niet meer geld vandaag. Wat ik vraag is duidelijkheid over morgen. Kunnen we afspreken dat we in september 2026 samenzitten om de stap naar \u20AC5.200 of \u20AC5.500 per januari 2027 concreet te maken? En kunnen we dat vastleggen in het addendum \u2014 niet het bedrag, maar het evaluatiemoment en de intentie?\"", rating: "green", label: "Sterk", feedback: "Je begint met waardering, deelt je realiteit zonder te dreigen, en verschuift je vraag van 'meer geld nu' naar 'duidelijkheid over wanneer.' Het woord 'intentie' is de sleutel: het is geen bindende belofte, maar het is ook geen lege woorden." },
      { text: "\"Dank je. Mag ik er een paar dagen over nadenken?\"", rating: "orange", label: "Risicovol", feedback: "Veilig. Het geeft je tijd. Maar het laat de deur open zonder iets concreets te vragen over 2027. Als je na drie dagen terugkomt met dezelfde vraag, ben je weer bij af." },
      { text: "\"Stien, dat gaat niet lukken. \u20AC4.800 zonder perspectief is niet werkbaar voor mij.\"", rating: "red", label: "Vermijden", feedback: "Je verwerpt het bod zonder alternatief en zonder waardering voor de stap die Stien zet. Het gesprek eindigt in een impasse." }
    ]
  }
];

let currentScene = 0;
let answers = [];
let showingAll = [];
let lastPhase = "";

function render() {
  const app = document.getElementById('app');
  if (currentScene >= scenes.length) { renderEnd(app); return; }
  const scene = scenes[currentScene];
  const progress = (currentScene / scenes.length) * 100;
  const answered = answers[currentScene] !== undefined;
  const allVisible = showingAll[currentScene] === true;
  const newPhase = scene.phase !== lastPhase;
  lastPhase = scene.phase;

  let html = `
    <div class="header">
      <div class="header-label">Gesprekssimulator</div>
      <h1>Loongesprek met Stien</h1>
      <p>Kies je reactie en leer van de feedback</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">SC\u00c8NE ${currentScene + 1} VAN ${scenes.length}</div>
    </div>
    <div class="scene">
      <div class="phase-label">${scene.phase}</div>
      <div class="stien-bubble">
        <div class="stien-name">Stien</div>
        <div class="stien-text">${scene.stien}</div>
      </div>
      <div class="context">${scene.context}</div>
      <div class="options-label">Hoe reageer je?</div>`;

  scene.options.forEach((opt, i) => {
    const isSelected = answered && answers[currentScene] === i;
    const isRevealed = answered;
    const isDimmed = isRevealed && !isSelected && !allVisible;
    let classes = 'option-card';
    if (isRevealed) classes += ` revealed ${opt.rating}`;
    if (isSelected) classes += ' selected';
    if (isDimmed) classes += ' dimmed';
    html += `
      <div class="${classes}" onclick="selectOption(${i})">
        <div class="option-top">
          <div class="option-text">${opt.text}</div>
          <div class="option-badge">${opt.label}</div>
        </div>
        <div class="option-feedback">${opt.feedback}</div>
      </div>`;
  });

  if (answered && !allVisible) {
    html += `<button class="show-all-btn" style="display:block" onclick="showAll()">Bekijk alle opties en feedback</button>`;
  }
  if (answered) {
    html += `
      <div class="nav-buttons">
        <button class="nav-btn" onclick="retry()">Opnieuw</button>
        <button class="nav-btn primary" onclick="next()">${currentScene < scenes.length - 1 ? 'Volgende sc\u00e8ne \u2192' : 'Bekijk resultaat \u2192'}</button>
      </div>`;
  }
  html += `</div>`;
  app.innerHTML = html;
  if (answered) {
    setTimeout(() => {
      const sel = document.querySelector('.option-card.selected');
      if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}

function selectOption(i) {
  if (answers[currentScene] !== undefined) return;
  answers[currentScene] = i;
  showingAll[currentScene] = false;
  render();
}

function showAll() {
  showingAll[currentScene] = true;
  document.querySelectorAll('.option-card').forEach(c => { c.classList.remove('dimmed'); c.classList.add('selected'); });
  document.querySelector('.show-all-btn').style.display = 'none';
}

function next() {
  currentScene++;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(render, 250);
}

function retry() {
  answers[currentScene] = undefined;
  showingAll[currentScene] = false;
  render();
}

function renderEnd(app) {
  let g = 0, o = 0, r = 0;
  answers.forEach((a, i) => {
    const rt = scenes[i].options[a].rating;
    if (rt === 'green') g++; else if (rt === 'orange') o++; else r++;
  });
  const score = Math.round((g / scenes.length) * 100);
  let msg = '';
  if (g >= 22) msg = 'Je bent er klaar voor. Vertrouw op jezelf morgen.';
  else if (g >= 17) msg = 'Sterke basis. Oefen de sc\u00e8nes waar je oranje of rood scoorde nog even.';
  else if (g >= 12) msg = 'Goede start, maar er zijn nog te veel onzekere momenten. Loop de oranje en rode sc\u00e8nes nog een paar keer door.';
  else msg = 'Je hebt de kennis, maar de reflexen zitten er nog niet in. Speel het nog twee of drie keer door tot de goede antwoorden vanzelf komen.';

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Gesprekssimulator</div>
      <h1>Loongesprek met Stien</h1>
    </div>
    <div class="end-screen">
      <h2>Resultaat</h2>
      <div class="score-big">${score}%</div>
      <div class="score-row">
        <span><span class="score-dot" style="background:var(--green)"></span>${g} sterk</span>
        <span><span class="score-dot" style="background:var(--orange)"></span>${o} risicovol</span>
        <span><span class="score-dot" style="background:var(--red)"></span>${r} vermijden</span>
      </div>
      <p>${msg}</p>
      <button class="nav-btn primary" onclick="restart()" style="margin-top:20px">Opnieuw spelen</button>
    </div>`;
}

function restart() {
  currentScene = 0; answers = []; showingAll = []; lastPhase = "";
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(render, 250);
}

render();
</script>
</body>
</html>
